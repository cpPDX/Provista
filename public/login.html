<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Provista — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#21ABCD" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/auth.css" />
  <style>
    #qr-video { width:100%; max-height:52svh; object-fit:cover; display:block; }
  </style>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" style="display:block">
          <rect width="48" height="48" rx="12" fill="#21ABCD"/>
          <text x="24" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-0.5">P</text>
        </svg>
      </div>
      <h1>Provista</h1>
    </div>

    <!-- Step 1: Login / Register choice -->
    <div class="auth-card" id="step-mode">
      <div class="auth-tabs">
        <button class="auth-tab active" data-mode="login">Sign In</button>
        <button class="auth-tab" data-mode="register">Create Account</button>
      </div>

      <!-- Login form -->
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label>Email</label>
          <input class="form-control" type="email" name="email" required placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-control" type="password" name="password" required placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div id="login-error" class="auth-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>

      <!-- Register form -->
      <form id="register-form" class="auth-form" style="display:none">
        <div class="form-group">
          <label>Your Name</label>
          <input class="form-control" type="text" name="name" required placeholder="Jane Smith" autocomplete="name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input class="form-control" type="email" name="email" required placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password <span class="text-muted text-sm">(min. 8 chars)</span></label>
          <input class="form-control" type="password" name="password" required minlength="8" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <div id="register-error" class="auth-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full">Continue</button>
      </form>
    </div>

    <!-- Step 2: Create or Join household -->
    <div class="auth-card" id="step-household" style="display:none">
      <h2 class="auth-step-title">Set up your household</h2>
      <p class="text-muted text-sm" style="margin-bottom:1.25rem">A household lets you share prices and shopping lists with family or housemates.</p>
      <div class="household-choice">
        <button class="household-choice-btn" id="btn-create-household">
          <span class="choice-icon">🏠</span>
          <div>
            <div class="choice-title">Create a household</div>
            <div class="choice-desc">Start fresh as the household owner</div>
          </div>
        </button>
        <button class="household-choice-btn" id="btn-join-household">
          <span class="choice-icon">🔗</span>
          <div>
            <div class="choice-title">Join a household</div>
            <div class="choice-desc">Enter an invite code from a household member</div>
          </div>
        </button>
      </div>
    </div>

    <!-- Step 3a: Create household -->
    <div class="auth-card" id="step-create" style="display:none">
      <button class="auth-back" id="back-from-create">‹ Back</button>
      <h2 class="auth-step-title">Name your household</h2>
      <form id="create-household-form" class="auth-form">
        <div class="form-group">
          <label>Household Name</label>
          <input class="form-control" type="text" name="householdName" required placeholder="e.g. The Smith Family" autocomplete="off" />
        </div>
        <div id="create-error" class="auth-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full">Create Household</button>
      </form>
    </div>

    <!-- Step 3b: Join household -->
    <div class="auth-card" id="step-join" style="display:none">
      <button class="auth-back" id="back-from-join">‹ Back</button>
      <h2 class="auth-step-title">Enter invite code</h2>
      <p class="text-muted text-sm" style="margin-bottom:1.25rem">Ask a household admin for their 6-character invite code, or scan their QR code.</p>
      <form id="join-household-form" class="auth-form">
        <div class="form-group">
          <label>Invite Code</label>
          <input class="form-control invite-code-input" type="text" name="inviteCode" required
            placeholder="XXXXXX" maxlength="6" autocomplete="off"
            style="text-transform:uppercase;letter-spacing:0.2em;font-size:1.5rem;text-align:center" />
        </div>
        <button type="button" id="btn-scan-qr" class="btn btn-outline btn-full" style="margin-bottom:0.75rem">&#128247; Scan QR Code</button>
        <div id="join-error" class="auth-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full">Join Household</button>
      </form>
    </div>
  </div>

  <!-- QR scanner overlay -->
  <div id="qr-scanner-overlay" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.88);align-items:center;justify-content:center;padding:1rem">
    <div style="width:100%;max-width:340px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <span style="color:#fff;font-weight:700;font-size:1.0625rem">Scan Invite QR Code</span>
        <button id="qr-close-btn" style="background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;line-height:1;padding:0.25rem">&#x2715;</button>
      </div>
      <div class="scanner-viewfinder-wrap">
        <video id="qr-video" autoplay playsinline muted></video>
        <div class="scanner-viewfinder"></div>
      </div>
      <p id="qr-status" class="scanner-status" style="color:#ccc;margin-top:0.75rem">Align the QR code within the frame</p>
    </div>
  </div>

  <script>
    // Prefill invite code from URL param (QR code link)
    const urlCode = new URLSearchParams(window.location.search).get('code');

    let pendingUser = null; // { name, email, password } from register step
    let _qrCodeReader = null;

    async function _startQrCamera() {
      _qrCodeReader = new ZXing.BrowserMultiFormatReader();
      const video = document.getElementById('qr-video');
      const status = document.getElementById('qr-status');
      status.textContent = 'Align the QR code within the frame';
      try {
        await _qrCodeReader.decodeFromConstraints(
          { video: { facingMode: { ideal: 'environment' } } },
          video,
          (result) => {
            if (!result) return;
            const text = result.getText();
            let code = null;
            try {
              const url = new URL(text);
              code = url.searchParams.get('code');
            } catch {
              if (/^[A-Z0-9]{6}$/i.test(text.trim())) code = text.trim();
            }
            if (code) {
              closeQrScanner();
              document.querySelector('[name=inviteCode]').value = code.toUpperCase();
            }
          }
        );
      } catch (err) {
        try { _qrCodeReader.reset(); _qrCodeReader = null; } catch (_) {}
        if (err?.name === 'NotAllowedError' || err?.name === 'PermissionDeniedError') {
          status.textContent = 'Camera access denied. Please type the code manually.';
        } else if (err?.name === 'NotFoundError') {
          status.textContent = 'No camera found. Please type the code manually.';
        } else {
          status.textContent = 'Could not start camera. Please type the code manually.';
        }
      }
    }

    function openQrScanner() {
      document.getElementById('qr-scanner-overlay').style.display = 'flex';
      if (window.ZXing?.BrowserMultiFormatReader) {
        _startQrCamera();
        return;
      }
      document.getElementById('qr-status').textContent = 'Loading scanner…';
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js';
      s.onload = _startQrCamera;
      s.onerror = () => {
        document.getElementById('qr-status').textContent = 'Scanner library failed to load. Please type the code manually.';
      };
      document.head.appendChild(s);
    }

    function closeQrScanner() {
      try { if (_qrCodeReader) { _qrCodeReader.reset(); _qrCodeReader = null; } } catch (_) {}
      document.getElementById('qr-scanner-overlay').style.display = 'none';
      document.getElementById('qr-status').textContent = 'Align the QR code within the frame';
    }

    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const mode = tab.dataset.mode;
        document.getElementById('login-form').style.display = mode === 'login' ? '' : 'none';
        document.getElementById('register-form').style.display = mode === 'register' ? '' : 'none';
        clearErrors();
      });
    });

    function clearErrors() {
      document.querySelectorAll('.auth-error').forEach(el => el.style.display = 'none');
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = '';
    }

    function showStep(id) {
      ['step-mode', 'step-household', 'step-create', 'step-join'].forEach(s => {
        document.getElementById(s).style.display = s === id ? '' : 'none';
      });
    }

    async function postJSON(url, body) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong');
      return data;
    }

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();
      const form = e.target;
      const btn = form.querySelector('button[type=submit]');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        await postJSON('/api/auth/login', {
          email: form.email.value,
          password: form.password.value
        });
        window.location.href = '/';
      } catch (err) {
        showError('login-error', err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    // Register step 1
    document.getElementById('register-form').addEventListener('submit', (e) => {
      e.preventDefault();
      clearErrors();
      const form = e.target;
      if (form.password.value.length < 8) {
        showError('register-error', 'Password must be at least 8 characters');
        return;
      }
      pendingUser = {
        name: form.name.value.trim(),
        email: form.email.value.trim(),
        password: form.password.value
      };
      // If code in URL, go straight to join step
      if (urlCode) {
        showStep('step-join');
        document.querySelector('[name=inviteCode]').value = urlCode.toUpperCase();
      } else {
        showStep('step-household');
      }
    });

    // Create / Join choice
    document.getElementById('btn-create-household').addEventListener('click', () => showStep('step-create'));
    document.getElementById('btn-join-household').addEventListener('click', () => showStep('step-join'));
    document.getElementById('back-from-create').addEventListener('click', () => showStep('step-household'));
    document.getElementById('back-from-join').addEventListener('click', () => {
      showStep(urlCode ? 'step-mode' : 'step-household');
    });

    // Create household
    document.getElementById('create-household-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();
      const btn = e.target.querySelector('button[type=submit]');
      btn.disabled = true;
      btn.textContent = 'Creating…';
      try {
        const data = await postJSON('/api/auth/register', {
          ...pendingUser,
          action: 'create',
          householdName: e.target.householdName.value.trim()
        });
        // Flag so wizard auto-starts only on this first login
        if (data.user && data.user._id) {
          localStorage.setItem('gt_new_household_' + data.user._id, '1');
        }
        window.location.href = '/';
      } catch (err) {
        showError('create-error', err.message);
        btn.disabled = false;
        btn.textContent = 'Create Household';
      }
    });

    // Join household
    document.getElementById('join-household-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();
      const btn = e.target.querySelector('button[type=submit]');
      btn.disabled = true;
      btn.textContent = 'Joining…';
      try {
        await postJSON('/api/auth/register', {
          ...pendingUser,
          action: 'join',
          inviteCode: e.target.inviteCode.value.trim()
        });
        window.location.href = '/';
      } catch (err) {
        showError('join-error', err.message);
        btn.disabled = false;
        btn.textContent = 'Join Household';
      }
    });

    // Force uppercase on invite code input
    document.querySelector('[name=inviteCode]').addEventListener('input', function() {
      this.value = this.value.toUpperCase();
    });

    document.getElementById('btn-scan-qr').addEventListener('click', openQrScanner);
    document.getElementById('qr-close-btn').addEventListener('click', closeQrScanner);
  </script>
</body>
</html>
