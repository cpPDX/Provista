<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Provista</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#21ABCD" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Tab: Prices -->
    <section class="tab-panel active" id="tab-prices">
      <header class="page-header">
        <h1>Product Prices</h1>
        <div class="price-add-actions">
          <button class="btn btn-icon" id="btn-prices-filter" style="position:relative" title="Filter &amp; Sort">⚙<span id="prices-filter-dot" class="filter-active-dot" style="display:none"></span></button>
          <button class="btn btn-primary btn-sm" id="btn-add-price">+ Log Price</button>
          <button class="btn btn-outline btn-sm" id="btn-open-csv-import">📂 Import</button>
        </div>
      </header>
      <div id="prices-filter-count" class="filter-count-bar" style="display:none"></div>
      <div class="search-bar">
        <input type="text" id="price-search" placeholder="Search items..." autocomplete="off" />
      </div>
      <div id="prices-list" class="card-list"></div>
      <!-- Pending Review section (admin+ only) -->
      <div id="scan-pending-section" class="admin-only" style="display:none; padding: 0 0 1rem;">
        <h2 class="section-title">Pending Review</h2>
        <div id="scan-pending-list" class="card-list"></div>
      </div>
      <!-- Note: scan-pending-section is kept for pending price entry reviews; receipt scanning removed -->
    </section>

    <!-- Tab: Shopping List -->
    <section class="tab-panel" id="tab-list">
      <header class="page-header">
        <h1>Shopping List</h1>
        <div class="page-header-actions">
          <button class="btn btn-sm btn-outline" id="btn-low-stock" style="display:none">
            🔴 Low Stock <span id="low-stock-count" class="badge-num"></span>
          </button>
          <button class="btn btn-primary btn-sm" id="btn-add-list-item">+ Add</button>
        </div>
      </header>
      <div id="list-summary" class="store-summary"></div>
      <div id="shopping-list" class="card-list"></div>
      <div class="list-actions">
        <button class="btn btn-outline btn-sm" id="btn-deselect-all">Deselect All</button>
        <button class="btn btn-outline btn-sm" id="btn-clear-checked">Clear Checked</button>
        <button class="btn btn-danger btn-sm admin-only" id="btn-clear-all">Clear All</button>
      </div>
    </section>


    <!-- Tab: Spend -->
    <section class="tab-panel" id="tab-spend">
      <header class="page-header">
        <h1>Spend</h1>
        <div class="month-nav">
          <button class="btn btn-icon" id="btn-prev-month">&#8249;</button>
          <span id="spend-month-label"></span>
          <button class="btn btn-icon" id="btn-next-month">&#8250;</button>
        </div>
      </header>
      <p class="text-muted text-sm disclaimer">Only reflects logged approved purchases.</p>
      <div id="spend-total-card" class="total-card"></div>
      <canvas id="spend-chart" height="180"></canvas>
      <h2 class="section-title">By Category</h2>
      <div class="breakdown-scroll-wrap">
        <div id="spend-by-category" class="breakdown-list"></div>
      </div>
      <h2 class="section-title">By Store</h2>
      <div class="breakdown-scroll-wrap">
        <div id="spend-by-store" class="breakdown-list"></div>
      </div>
    </section>

    <!-- Tab: Inventory (admin-only nav tab) -->
    <section class="tab-panel" id="tab-inventory">
      <header class="page-header">
        <h1>Inventory</h1>
        <div class="page-header-actions">
          <button class="btn btn-primary btn-sm" id="btn-add-inventory">+ Add</button>
        </div>
      </header>
      <div id="inventory-list" class="card-list" style="padding:0.75rem"></div>
    </section>

    <!-- Tab: Meal Plan -->
    <section class="tab-panel" id="tab-meal-plan">
      <header class="page-header">
        <h1>Meal Plan</h1>
      </header>
      <div id="meal-plan-content" style="padding:0 0 1rem"></div>
    </section>

    <!-- Tab: More (user/settings panel — opened via hamburger) -->
    <section class="tab-panel" id="tab-more">
      <header class="page-header">
        <h1>Menu</h1>
        <div class="page-header-actions">
          <div id="user-label" class="text-muted text-sm" style="text-align:right"></div>
          <button class="btn btn-outline btn-sm" id="btn-logout">Sign Out</button>
        </div>
      </header>
      <!-- Admin quick-access tiles (hidden for members via role CSS) -->
      <div class="more-quick-access admin-only" id="more-quick-access" style="display:none">
        <button class="quick-tile" data-section="items"><span class="quick-tile-icon">🏷️</span>Catalog</button>
        <button class="quick-tile" data-section="stores"><span class="quick-tile-icon">🏪</span>Stores</button>
        <button class="quick-tile" id="quick-tile-csv"><span class="quick-tile-icon">📂</span>Import CSV</button>
        <button class="quick-tile" data-section="household"><span class="quick-tile-icon">👥</span>Household</button>
      </div>

      <div class="more-menu">
        <button class="more-item" data-section="account">
          <span class="more-icon">👤</span>
          <span>My Account</span>
          <span class="chevron">›</span>
        </button>
        <button class="more-item" data-section="household">
          <span class="more-icon">👥</span>
          <span>Household</span>
          <span class="chevron">›</span>
        </button>
        <button class="more-item admin-only" data-section="items">
          <span class="more-icon">🏷️</span>
          <span>Product Catalog</span>
          <span class="chevron">›</span>
        </button>
        <button class="more-item admin-only" data-section="stores">
          <span class="more-icon">🏪</span>
          <span>Stores</span>
          <span class="chevron">›</span>
        </button>
        <button class="more-item admin-only" id="btn-more-csv-import">
          <span class="more-icon">📂</span>
          <span>Import Prices from CSV</span>
          <span class="chevron">›</span>
        </button>
        <button class="more-item" id="btn-resume-setup" style="display:none;border-color:var(--primary)">
          <span class="more-icon">🧭</span>
          <span>Continue Setup (Wizard)</span>
          <span class="chevron">›</span>
        </button>
        <button class="more-item" data-section="about">
          <span class="more-icon">ℹ️</span>
          <span>About</span>
          <span class="chevron">›</span>
        </button>
        <button class="more-item" id="btn-app-tour">
          <span class="more-icon">🗺️</span>
          <span>App Tour</span>
          <span class="chevron">›</span>
        </button>
      </div>

      <!-- Product Catalog sub-section (admin+) -->
      <div id="section-items" class="sub-section" style="display:none">
        <div class="sub-header">
          <button class="btn btn-icon back-btn">‹</button>
          <h2>Product Catalog</h2>
          <div style="display:flex;gap:0.375rem;align-items:center">
            <button class="btn btn-icon" id="btn-catalog-filter" style="position:relative" title="Filter &amp; Sort">⚙<span id="catalog-filter-dot" class="filter-active-dot" style="display:none"></span></button>
            <button class="btn btn-primary btn-sm" id="btn-add-item-catalog">+ Add Item</button>
          </div>
        </div>
        <div id="catalog-back-banner" class="catalog-back-banner" style="display:none">
          <button class="btn-link" id="btn-catalog-back">← Back</button>
        </div>
        <div id="catalog-filter-count" class="filter-count-bar" style="display:none"></div>
        <div class="search-bar">
          <input type="text" id="catalog-search" placeholder="Search catalog..." autocomplete="off" />
        </div>
        <div id="catalog-list" class="card-list"></div>
      </div>

      <!-- Stores sub-section (admin+) -->
      <div id="section-stores" class="sub-section" style="display:none">
        <div class="sub-header">
          <button class="btn btn-icon back-btn">‹</button>
          <h2>Stores</h2>
          <button class="btn btn-primary btn-sm" id="btn-add-store">+ Add Store</button>
        </div>
        <div id="stores-list" class="card-list"></div>
      </div>

      <!-- Household sub-section (all roles) -->
      <div id="section-household" class="sub-section" style="display:none">
        <div class="sub-header">
          <button class="btn btn-icon back-btn">‹</button>
          <h2>Household</h2>
        </div>
        <div id="household-content" style="padding:0 1rem 1rem"></div>
      </div>

      <!-- Account sub-section (all roles) -->
      <div id="section-account" class="sub-section" style="display:none">
        <div class="sub-header">
          <button class="btn btn-icon back-btn">‹</button>
          <h2>My Account</h2>
        </div>
        <div id="account-content" style="padding:0 1rem 1rem"></div>
      </div>

      <!-- About sub-section (all roles) -->
      <div id="section-about" class="sub-section" style="display:none">
        <div class="sub-header">
          <button class="btn btn-icon back-btn">‹</button>
          <h2>About</h2>
        </div>
        <div id="about-content" style="padding:1rem"></div>
      </div>

    </section>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="prices">
      <span class="nav-icon">💰</span>
      <span>Prices</span>
      <span id="nav-pending-dot" class="nav-pending-dot" style="display:none"></span>
    </button>
    <button class="nav-item" data-tab="list">
      <span class="nav-icon">📋</span>
      <span>List</span>
    </button>
    <button class="nav-item admin-only" data-tab="inventory">
      <span class="nav-icon">🧺</span>
      <span>Inventory</span>
    </button>
    <button class="nav-item" data-tab="meal-plan">
      <span class="nav-icon">🥗</span>
      <span>Meal Plan</span>
    </button>
    <button class="nav-item" data-tab="spend">
      <span class="nav-icon">📊</span>
      <span>Spend</span>
    </button>
    <button class="nav-item" data-tab="more">
      <span class="nav-icon">☰</span>
      <span>More</span>
    </button>
  </nav>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button class="btn btn-icon" id="modal-close">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Cart Running Total Bar (shown above nav when items are checked off) -->
  <div id="cart-bar" class="cart-bar" style="display:none">
    <div class="cart-bar-summary" id="cart-bar-summary">
      <span id="cart-bar-label">In cart: $0.00 (0 items)</span>
      <span class="cart-bar-chevron">›</span>
    </div>
    <div id="cart-bar-detail" class="cart-bar-detail" style="display:none">
    <div class="done-shopping-row">
      <button class="btn btn-primary btn-full" id="btn-done-shopping">Done Shopping ✓</button>
    </div>
  </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" style="display:none"></div>

  <!-- Item Detail Panel -->
  <div id="item-detail-panel" class="slide-panel" style="display:none">
    <div class="panel-handle-row"><div class="panel-drag-handle"></div></div>
    <div class="slide-panel-header">
      <button class="btn btn-icon" id="close-detail">‹</button>
      <div style="flex:1;min-width:0">
        <h2 id="detail-item-name"></h2>
        <button class="detail-catalog-link" id="btn-view-in-catalog" style="display:none">View in Catalog →</button>
      </div>
    </div>
    <div class="detail-tabs">
      <button class="detail-tab active" data-detail="history">History</button>
      <button class="detail-tab" data-detail="compare">Compare</button>
      <button class="detail-tab" data-detail="trend">Trend</button>
    </div>
    <div id="detail-history" class="detail-content active"></div>
    <div id="detail-compare" class="detail-content"></div>
    <div id="detail-trend" class="detail-content">
      <canvas id="trend-chart" data-height="200" style="width:100%;height:200px"></canvas>
    </div>
  </div>

  <!-- Scripts -->
  <!-- Unsaved changes prompt -->
  <div id="unsaved-prompt" class="unsaved-prompt" style="display:none">
    <p class="unsaved-prompt-msg">You have unsaved changes.</p>
    <div class="unsaved-prompt-actions">
      <button id="unsaved-cancel" class="btn btn-outline btn-sm">Cancel</button>
      <button id="unsaved-save" class="btn btn-primary btn-sm">Stay &amp; Save</button>
      <button id="unsaved-leave" class="btn btn-danger btn-sm">Leave</button>
    </div>
  </div>

  <!-- Filter sheet (shared by prices + catalog) -->
  <div id="filter-sheet-overlay" class="filter-sheet-overlay" style="display:none">
    <div class="filter-sheet" id="filter-sheet">
      <div class="filter-sheet-header">
        <span id="filter-sheet-title" class="filter-sheet-title">Filter &amp; Sort</span>
        <button class="btn-link" id="filter-sheet-clear">Clear all</button>
      </div>
      <div id="filter-sheet-body" class="filter-sheet-body"></div>
      <div class="filter-sheet-footer">
        <button class="btn btn-primary btn-full" id="filter-sheet-done">Done</button>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/autocomplete.js"></script>
  <script src="/js/prices.js"></script>
  <script src="/js/shoppingList.js"></script>
  <script src="/js/csvImport.js"></script>
  <script src="/js/spend.js"></script>
  <script src="/js/more.js"></script>
  <script src="/js/mealPlan.js"></script>
  <script src="/js/onboarding.js"></script>
  <script src="/js/app.js"></script>
  <!-- scan.js removed: receipt scanning feature removed -->
</body>
</html>
